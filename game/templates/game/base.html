<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>{% block title %}Cosmos Miners{% endblock %}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            space: "#05050f",
            card: "rgba(20,30,60,0.75)",
            accent: "#00e0ff",
            pink: "#ff4d8d",
            blueglow: "#0077ff"
          }
        }
      }
    }
  </script>
  <style>
    .custom-scrollbar::-webkit-scrollbar { height: 3px; width: 3px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,224,255,0.3); border-radius: 10px; }
    
    @keyframes slideInItem {
      from { transform: translateX(20px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .menu-item-anim {
      opacity: 0;
      animation: slideInItem 0.4s ease forwards;
    }
    
    @keyframes breathing {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }
    .breathing {
      animation: breathing 3s ease-in-out infinite;
    }

    @keyframes twinkle {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 1; }
    }
    
    @keyframes float {
      0%, 100% { transform: translateY(0) translateX(0); opacity: 0.1; }
      25% { transform: translateY(-20px) translateX(10px); opacity: 0.4; }
      50% { transform: translateY(-40px) translateX(0); opacity: 0.2; }
      75% { transform: translateY(-20px) translateX(-10px); opacity: 0.4; }
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>

<body class="min-h-screen bg-space text-white overflow-x-hidden relative">

  <!-- 🌟 PREMIUM BACKGROUND -->
  <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
    <!-- Nebula Layers -->
    <div class="absolute inset-0 bg-gradient-to-b from-blue-950/80 via-indigo-950/60 to-purple-950/90"></div>
    <div class="absolute inset-0 opacity-20 bg-[radial-gradient(circle,_rgba(255,255,255,0.15)_1px,_transparent_1px)] bg-[size:32px_32px]"></div>
    
    <!-- Animated Nebula Glows -->
    <div class="absolute top-1/4 left-1/4 w-96 h-96 rounded-full bg-blue-500/10 blur-[120px] animate-pulse"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 rounded-full bg-purple-500/10 blur-[120px] animate-pulse" style="animation-delay: 2s;"></div>
    
    <div id="stars_container" class="absolute inset-0"></div>
  </div>

  <div class="relative z-10">
    {% block content %}{% endblock %}
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script>
    // Create background stars
    const container = document.getElementById('stars_container');
    if (container) {
      for (let i = 0; i < 150; i++) {
        const star = document.createElement('div');
        star.className = 'absolute rounded-full bg-white';
        const size = Math.random() * 2 + 0.5;
        star.style.width = `${size}px`;
        star.style.height = `${size}px`;
        star.style.left = `${Math.random() * 100}%`;
        star.style.top = `${Math.random() * 100}%`;
        star.style.opacity = Math.random() * 0.5 + 0.1;
        if (Math.random() > 0.8) {
          star.style.animation = `twinkle ${Math.random() * 3 + 2}s infinite alternate`;
        }
        container.appendChild(star);
      }
    }
  </script>
  {% block extra_js %}{% endblock %}
</body>
</html>
