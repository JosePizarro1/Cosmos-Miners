<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Admin Cofres · Cosmos Miners</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            space: "#05050f",
            card: "rgba(20,30,60,0.75)",
            accent: "#00e0ff",
            pink: "#ff4d8d",
          }
        }
      }
    }
  </script>
  <!-- SweetAlert2 -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    .swal2-popup {
      background: #0a0a20 !important;
      color: white !important;
      border: 1px solid rgba(255,255,255,0.1) !important;
      border-radius: 24px !important;
    }
    .swal2-title { color: white !important; }
    .swal2-confirm { background: #ff4d8d !important; border-radius: 12px !important; }
    .swal2-cancel { background: rgba(255,255,255,0.1) !important; border-radius: 12px !important; }
  </style>
</head>
<body class="min-h-screen bg-space text-white overflow-x-hidden relative">
  <div class="absolute inset-0 bg-[radial-gradient(circle,_rgba(255,255,255,0.15)_1px,_transparent_1px)] bg-[size:32px_32px] opacity-20"></div>

  <header class="relative z-10 px-6 py-6 flex items-center justify-between max-w-6xl mx-auto">
    <div class="flex items-center gap-3">
      <i class="fas fa-box-open text-accent text-2xl"></i>
      <span class="font-extrabold tracking-widest text-lg bg-gradient-to-r from-accent to-pink bg-clip-text text-transparent">COSMOS</span>
      <span class="text-xs text-gray-300 ml-2 uppercase tracking-tighter font-bold">Admin · Cofres</span>
    </div>
    <div class="flex items-center gap-3">
      <button onclick="openCreateModal()" class="bg-accent text-black px-4 py-2 rounded-xl text-sm font-bold hover:scale-105 transition-transform">
        <i class="fas fa-plus mr-1"></i> Nuevo Cofre
      </button>
      <a href="/dashboard/admin/" class="bg-card border border-white/10 px-4 py-2 rounded-xl text-sm font-semibold">Volver</a>
    </div>
  </header>

  <main class="relative z-10 px-6 pb-12 max-w-6xl mx-auto">
    <div id="chestsList" class="grid gap-6 md:grid-cols-2 lg:grid-cols-3">
      <!-- Loading... -->
    </div>
  </main>

  <!-- Modal Principal (Crear/Editar) -->
  <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm hidden p-4">
    <div class="bg-[#0a0a20] border border-white/10 w-full max-w-4xl max-h-[90vh] overflow-y-auto rounded-3xl p-8 relative">
      <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-400 hover:text-white"><i class="fas fa-times text-xl"></i></button>
      
      <h2 id="modalTitle" class="text-3xl font-black mb-6 bg-gradient-to-r from-accent to-pink bg-clip-text text-transparent uppercase">Crear Nuevo Cofre</h2>
      
      <form id="chestForm" class="space-y-6">
        <input type="hidden" name="id" id="editId">
        <div class="grid md:grid-cols-2 gap-6">
          <div class="space-y-4">
            <div>
              <label class="block text-xs uppercase text-gray-400 font-bold mb-1">Nombre</label>
              <input type="text" name="name" id="fName" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:border-accent outline-none">
            </div>
            <div>
              <label class="block text-xs uppercase text-gray-400 font-bold mb-1">Categoría</label>
              <select name="category_id" id="categorySelect" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:border-accent outline-none">
                <!-- Loaded via JS -->
              </select>
            </div>
            <div>
              <label class="block text-xs uppercase text-gray-400 font-bold mb-1">Precio (Decimal)</label>
              <input type="number" step="0.01" name="price" id="fPrice" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:border-accent outline-none">
            </div>
            <div>
              <label class="block text-xs uppercase text-gray-400 font-bold mb-1">Premios por Apertura</label>
              <input type="number" name="rewards_per_open" id="fRewardsPerOpen" value="1" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:border-accent outline-none">
            </div>
          </div>
          <div class="space-y-4">
            <div>
              <label class="block text-xs uppercase text-gray-400 font-bold mb-1">Descripción</label>
              <textarea name="description" id="fDescription" required rows="3" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 focus:border-accent outline-none"></textarea>
            </div>
            <div>
              <label class="block text-xs uppercase text-gray-400 font-bold mb-1">Imagen / GIF <span id="imageHelp" class="text-[9px] lowercase text-gray-500 font-normal"></span></label>
              <input type="file" name="image" id="imageInput" class="w-full text-sm text-gray-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:bg-white/10 file:text-accent hover:file:bg-white/20">
              <div id="imagePreviewContainer" class="mt-4 hidden border border-white/10 rounded-2xl p-2 bg-white/5">
                <p class="text-[10px] uppercase text-gray-500 mb-2 text-center">Previsualización</p>
                <img id="imagePreview" src="#" class="max-h-32 mx-auto object-contain">
              </div>
            </div>
            <div class="flex items-center gap-2">
              <input type="checkbox" name="is_in_store" checked id="fInStore" class="w-5 h-5 accent-accent cursor-pointer">
              <label for="fInStore" class="text-sm font-bold cursor-pointer">Mostrar en tienda</label>
            </div>
          </div>
        </div>

        <div class="border-t border-white/10 pt-6">
          <div class="flex items-center justify-between mb-4">
            <h3 class="font-bold text-lg">Probabilidades de Premios</h3>
            <button type="button" onclick="addRewardRow()" class="text-xs bg-white/10 px-3 py-1 rounded-lg hover:bg-white/20 transition-colors">
              <i class="fas fa-plus mr-1 text-accent"></i> Añadir Recompensa
            </button>
          </div>
          
          <div id="rewardsContainer" class="space-y-3">
            <!-- Reward rows added here -->
          </div>
          
          <div class="mt-4 p-4 bg-white/5 rounded-xl flex justify-between items-center">
            <span class="text-sm text-gray-400">Total Probabilidad de Código:</span>
            <span id="totalCodeProb" class="font-mono text-accent">0.0000 / 1.0000</span>
          </div>
        </div>

        <div class="flex justify-end gap-3 mt-8">
          <button type="button" onclick="closeModal()" class="px-6 py-3 rounded-xl border border-white/10 font-bold hover:bg-white/5 transition-colors">Cancelar</button>
          <button type="submit" id="submitBtn" class="px-10 py-3 rounded-xl bg-gradient-to-r from-accent to-pink text-black font-black hover:scale-105 transition-transform">GUARDAR COFRE</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Info Modal -->
  <div id="infoModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm hidden p-4">
    <div class="bg-[#0a0a20] border border-white/10 w-full max-w-lg rounded-3xl p-8 relative">
      <button onclick="closeInfoModal()" class="absolute top-6 right-6 text-gray-400 hover:text-white"><i class="fas fa-times text-xl"></i></button>
      <h2 id="infoTitle" class="text-2xl font-black mb-4 bg-gradient-to-r from-accent to-pink bg-clip-text text-transparent uppercase tracking-tighter">Recompensas del Cofre</h2>
      <div id="infoContent" class="space-y-4">
        <!-- Loaded via JS -->
      </div>
      <button onclick="closeInfoModal()" class="w-full mt-6 py-3 rounded-xl bg-white/5 border border-white/10 font-bold hover:bg-white/10 transition-colors">Cerrar</button>
    </div>
  </div>

  <script>
    let deps = { categories: [], items: {} };

    async function loadChests() {
      const container = document.getElementById('chestsList');
      container.innerHTML = '<div class="col-span-full py-20 text-center text-gray-500"><i class="fas fa-circle-notch fa-spin text-4xl mb-4"></i><p>Cargando cofres...</p></div>';
      
      try {
        const res = await fetch('/dashboard/chests/list/', {
          method: 'POST',
          headers: { 'X-CSRFToken': getCookie('csrftoken') }
        });
        const data = await res.json();
        
        if (!data.items || data.items.length === 0) {
          container.innerHTML = '<div class="col-span-full py-20 text-center text-gray-500"><i class="fas fa-box-open text-4xl mb-4"></i><p>No hay cofres creados aún.</p></div>';
          return;
        }

        container.innerHTML = data.items.map(c => `
          <div class="bg-card border border-white/10 rounded-3xl p-6 relative overflow-hidden group">
            <div class="absolute top-0 right-0 p-4 flex gap-2">
              <button onclick='toggleChest(${c.id})' title="Alternar visibilidad en tienda" 
                class="w-8 h-8 rounded-lg flex items-center justify-center ${c.is_in_store ? 'bg-green-500/10 text-green-400' : 'bg-white/5 text-gray-600'} hover:scale-110 transition-all">
                <i class="fas ${c.is_in_store ? 'fa-eye' : 'fa-eye-slash'}"></i>
              </button>
              <button onclick='editChest(${JSON.stringify(c).replace(/'/g, "&apos;")})' class="bg-white/5 w-8 h-8 rounded-lg text-gray-400 hover:text-accent hover:scale-110 transition-all"><i class="fas fa-edit"></i></button>
              <button onclick='showInfo(${JSON.stringify(c).replace(/'/g, "&apos;")})' class="bg-white/5 w-8 h-8 rounded-lg text-gray-400 hover:text-accent hover:scale-110 transition-all"><i class="fas fa-info-circle"></i></button>
              <button onclick="deleteChest(${c.id})" class="bg-white/5 w-8 h-8 rounded-lg text-gray-500 hover:text-red-500 hover:scale-110 transition-all"><i class="fas fa-trash"></i></button>
            </div>
            <img src="${c.image_url}" class="w-28 h-28 mx-auto object-contain mb-4 group-hover:scale-110 transition-transform duration-500">
            <div class="text-center">
              <span class="text-[10px] uppercase font-black bg-accent/20 text-accent px-2 py-1 rounded-full mb-3 inline-block tracking-tighter">${c.category_name}</span>
              <h3 class="text-lg font-black uppercase tracking-tight line-clamp-1">${c.name}</h3>
              <p class="text-gray-400 text-xs mt-2 line-clamp-2 h-8">${c.description}</p>
              <div class="mt-4 pt-4 border-t border-white/5 flex items-center justify-between">
                <span class="text-accent font-mono font-black uppercase text-sm">${c.price} GOLD</span>
                <span class="text-[9px] text-gray-500 font-bold uppercase">${c.rewards.length} Premios</span>
              </div>
            </div>
          </div>
        `).join('');
      } catch (e) {
        container.innerHTML = '<p class="text-red-500 text-center col-span-full">Error al cargar cofres</p>';
      }
    }

    async function loadDeps() {
      const res = await fetch('/dashboard/chests/dependencies/');
      deps = await res.json();
      
      const select = document.getElementById('categorySelect');
      select.innerHTML = '<option value="">Selecciona categoría...</option>' + 
        deps.categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
    }

    function addRewardRow(data = null) {
      const container = document.getElementById('rewardsContainer');
      const div = document.createElement('div');
      div.className = "reward-row grid grid-cols-12 gap-3 bg-white/5 p-3 rounded-xl items-center border border-white/5 hover:border-white/10 transition-colors";
      
      div.innerHTML = `
        <div class="col-span-4">
          <select class="reward-type w-full bg-space border border-white/10 rounded-lg px-2 py-2 text-[10px] font-black uppercase outline-none" onchange="updateItemSelect(this)">
            <option value="">Tipo...</option>
            <option value="miner" ${data && data.type === 'miner' ? 'selected' : ''}>Minero</option>
            <option value="transport" ${data && data.type === 'transport' ? 'selected' : ''}>Transporte</option>
            <option value="tool" ${data && data.type === 'tool' ? 'selected' : ''}>Herramienta</option>
          </select>
        </div>
        <div class="col-span-4">
          <select class="reward-item w-full bg-space border border-white/10 rounded-lg px-2 py-2 text-[10px] font-bold outline-none">
            <option value="">Cargando...</option>
          </select>
        </div>
        <div class="col-span-2">
          <input type="number" step="0.01" value="${data ? data.display_probability : ''}" placeholder="% Usu" class="reward-disp-prob w-full bg-space border border-white/10 rounded-lg px-2 py-2 text-[10px] text-center font-mono outline-none">
        </div>
        <div class="col-span-1">
          <input type="number" step="0.0001" value="${data ? data.code_probability : ''}" placeholder="Cód" class="reward-code-prob w-full bg-space border border-white/10 rounded-lg px-2 py-2 text-[10px] text-center font-mono outline-none" oninput="calculateTotalProb()">
        </div>
        <div class="col-span-1 text-right">
          <button type="button" onclick="this.parentElement.parentElement.remove(); calculateTotalProb();" class="text-gray-600 hover:text-red-500 transition-colors"><i class="fas fa-times"></i></button>
        </div>
      `;
      container.appendChild(div);
      
      const typeSelect = div.querySelector('.reward-type');
      updateItemSelect(typeSelect, data ? data.item_id : null);
    }

    function updateItemSelect(typeSelect, preselectId = null) {
      const row = typeSelect.parentElement.parentElement;
      const itemSelect = row.querySelector('.reward-item');
      const type = typeSelect.value;
      
      if (!type) {
        itemSelect.innerHTML = '<option value="">Selecciona tipo...</option>';
        return;
      }
      
      const list = deps.items[type] || [];
      itemSelect.innerHTML = '<option value="">Elegir ítem...</option>' + 
        list.map(i => `<option value="${i.id}" ${preselectId == i.id ? 'selected' : ''}>${i.name}</option>`).join('');
    }

    function calculateTotalProb() {
      const inputs = document.querySelectorAll('.reward-code-prob');
      let total = 0;
      inputs.forEach(i => total += parseFloat(i.value || 0));
      
      const el = document.getElementById('totalCodeProb');
      el.textContent = `${total.toFixed(4)} / 1.0000`;
      el.className = `font-mono font-black ${Math.abs(total - 1) < 0.0001 ? 'text-green-400' : 'text-accent'}`;
    }

    async function toggleChest(id) {
        try {
            const res = await fetch(`/dashboard/chests/toggle/${id}/`, {
                method: 'POST',
                headers: { 'X-CSRFToken': getCookie('csrftoken') }
            });
            const data = await res.json();
            if (data.success) {
                loadChests();
            } else {
                Swal.fire('Error', data.error, 'error');
            }
        } catch(e) {
            Swal.fire('Error', 'Error de red', 'error');
        }
    }

    function editChest(c) {
        document.getElementById('editId').value = c.id;
        document.getElementById('modalTitle').textContent = `Editar: ${c.name}`;
        document.getElementById('fName').value = c.name;
        document.getElementById('fPrice').value = c.price;
        document.getElementById('fDescription').value = c.description;
        document.getElementById('fRewardsPerOpen').value = c.rewards_per_open;
        document.getElementById('categorySelect').value = c.category_id;
        document.getElementById('fInStore').checked = c.is_in_store;
        
        // Image logic: not required anymore since we keep old one if empty
        document.getElementById('imageInput').required = false;
        document.getElementById('imageHelp').textContent = "(Opcional si no deseas cambiarla)";
        
        if (c.image_url) {
            document.getElementById('imagePreview').src = c.image_url;
            document.getElementById('imagePreviewContainer').classList.remove('hidden');
        }

        // Clean and fill rewards
        const container = document.getElementById('rewardsContainer');
        container.innerHTML = "";
        c.rewards.forEach(r => {
            // Adjust r to match addRewardRow expectations (item_id is needed)
            // Note: our chests_list view returns ID of ChestReward in r.id, 
            // but we need the ID of the specific item (MinerType/TransportType/etc)
            // I'll need to update chests_list view if item_id isn't there.
            // Looking at chests_list view, I didn't add item_id there. Let me fix that.
        });
        
        // WAIT: I noticed I don't have item_id in the JSON returned by chests_list. 
        // Let me manually find the row based on name if I have to, or better 
        // I will fix the view first.
        // For now, I'll stop here and fix the view_chests.py
        openModal();
    }

    // UPDATED editChest with the fixed view data
    function editChestFinal(c) {
        document.getElementById('editId').value = c.id;
        document.getElementById('modalTitle').textContent = `Editar: ${c.name}`;
        document.getElementById('fName').value = c.name;
        document.getElementById('fPrice').value = c.price;
        document.getElementById('fDescription').value = c.description;
        document.getElementById('fRewardsPerOpen').value = c.rewards_per_open;
        document.getElementById('categorySelect').value = c.category_id;
        document.getElementById('fInStore').checked = c.is_in_store;
        
        document.getElementById('imageInput').required = false;
        document.getElementById('imageHelp').textContent = "(Opcional)";
        
        if (c.image_url) {
            document.getElementById('imagePreview').src = c.image_url;
            document.getElementById('imagePreviewContainer').classList.remove('hidden');
        }

        const container = document.getElementById('rewardsContainer');
        container.innerHTML = "";
        if (c.rewards) {
            c.rewards.forEach(r => addRewardRow(r));
        }
        calculateTotalProb();
        openModal();
    }
    
    // Wire editChest to editChestFinal
    function editChest(c) { editChestFinal(c); }

    function openCreateModal() {
        document.getElementById('editId').value = "";
        document.getElementById('modalTitle').textContent = "Crear Nuevo Cofre";
        document.getElementById('chestForm').reset();
        document.getElementById('rewardsContainer').innerHTML = "";
        document.getElementById('imagePreviewContainer').classList.add('hidden');
        document.getElementById('imageInput').required = true;
        document.getElementById('imageHelp').textContent = "";
        calculateTotalProb();
        openModal();
    }

    async function deleteChest(id) {
      const result = await Swal.fire({
        title: '¿Estás seguro?',
        text: "Esta acción eliminará el cofre permanentemente.",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'SÍ, ELIMINAR',
        cancelButtonText: 'CANCELAR'
      });

      if (result.isConfirmed) {
        await fetch(`/dashboard/chests/delete/${id}/`, {
          method: 'POST',
          headers: { 'X-CSRFToken': getCookie('csrftoken') }
        });
        loadChests();
        Swal.fire('Eliminado', 'El cofre ha sido eliminado.', 'success');
      }
    }

    function showInfo(chest) {
      document.getElementById('infoTitle').textContent = `${chest.name}`;
      const container = document.getElementById('infoContent');
      
      if (!chest.rewards || chest.rewards.length === 0) {
        container.innerHTML = '<p class="text-gray-500 text-center py-10 font-bold uppercase text-[10px] tracking-widest">Sin premios configurados.</p>';
      } else {
        container.innerHTML = `
          <div class="grid grid-cols-2 gap-2 text-[10px] uppercase font-black text-gray-500 px-2 tracking-widest">
            <div>Carga Útil</div>
            <div class="text-right">Probabilidad</div>
          </div>
          <div class="space-y-2 max-h-[400px] overflow-y-auto pr-1">
          ${chest.rewards.map(r => `
            <div class="flex items-center justify-between bg-white/5 p-4 rounded-2xl border border-white/5 hover:bg-white/10 transition-colors">
              <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-xl bg-accent/10 flex items-center justify-center text-accent text-lg">
                  <i class="fas ${r.type === 'miner' ? 'fa-user-ninja' : r.type === 'transport' ? 'fa-truck' : 'fa-tools'}"></i>
                </div>
                <div>
                  <p class="font-black text-sm uppercase tracking-tight">${r.name}</p>
                  <p class="text-[9px] text-gray-500 uppercase font-bold tracking-tighter">${r.type}</p>
                </div>
              </div>
              <div class="text-right">
                <p class="font-mono text-accent font-black text-xs shadow-[0_0_10px_rgba(0,224,255,0.2)]">${r.display_probability}%</p>
                <p class="text-[8px] text-gray-700 font-mono">${r.code_probability}</p>
              </div>
            </div>
          `).join('')}
          </div>
        `;
      }
      openInfoModal();
    }

    function openInfoModal() { document.getElementById('infoModal').classList.remove('hidden'); }
    function closeInfoModal() { document.getElementById('infoModal').classList.add('hidden'); }

    document.getElementById('chestForm').onsubmit = async (e) => {
      e.preventDefault();
      const editId = document.getElementById('editId').value;
      const url = editId ? `/dashboard/chests/update/${editId}/` : '/dashboard/chests/create/';
      
      const formData = new FormData(e.target);
      const rewards = [];
      document.querySelectorAll('.reward-row').forEach(row => {
        const type = row.querySelector('.reward-type').value;
        const itemId = row.querySelector('.reward-item').value;
        const disp = row.querySelector('.reward-disp-prob').value;
        const code = row.querySelector('.reward-code-prob').value;
        
        if (type && itemId) {
          rewards.push({
            type: type,
            item_id: itemId,
            display_probability: disp,
            code_probability: code
          });
        }
      });
      
      formData.append('rewards', JSON.stringify(rewards));
      
      const btn = document.getElementById('submitBtn');
      const oldText = btn.textContent;
      btn.disabled = true;
      btn.textContent = "PROCESANDO...";

      try {
        const res = await fetch(url, {
          method: 'POST',
          headers: { 'X-CSRFToken': getCookie('csrftoken') },
          body: formData
        });
        const data = await res.json();
        if (data.success) {
          closeModal();
          loadChests();
          Swal.fire('¡Éxito!', editId ? 'Cofre actualizado' : 'Cofre creado', 'success');
        } else {
          Swal.fire('Error', data.error, 'error');
        }
      } catch (err) {
        Swal.fire('Error', 'Error de conexión', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = oldText;
      }
    };

    document.getElementById('imageInput').onchange = (e) => {
      const [file] = e.target.files;
      if (file) {
        const preview = document.getElementById('imagePreview');
        preview.src = URL.createObjectURL(file);
        document.getElementById('imagePreviewContainer').classList.remove('hidden');
      }
    };

    function openModal() { document.getElementById('modal').classList.remove('hidden'); }
    function closeModal() { document.getElementById('modal').classList.add('hidden'); }

    function getCookie(name) {
      let cookieValue = null;
      if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
          const cookie = cookies[i].trim();
          if (cookie.substring(0, name.length + 1) === (name + '=')) {
            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
            break;
          }
        }
      }
      return cookieValue;
    }

    window.onload = () => {
      loadChests();
      loadDeps();
    };
  </script>
</body>
</html>
