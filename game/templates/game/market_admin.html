<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Configuración Mercadoo | Admin</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body class="bg-[#05050f] text-white min-h-screen pb-20">

    <header class="px-6 py-6 border-b border-white/5 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <i class="fas fa-chart-line text-yellow-400 text-2xl"></i>
            <h1 class="text-xl font-black uppercase tracking-tighter italic">Mercadoo <span class="text-xs text-gray-500 not-italic">Admin</span></h1>
        </div>
        <a href="/dashboard/admin/" class="bg-white/5 border border-white/10 px-4 py-2 rounded-xl text-xs font-bold uppercase hover:bg-white/10 transition-all">Volver</a>
    </header>

    <main class="max-w-6xl mx-auto px-6 mt-10">
        
        <!-- Global Settings Section -->
        <section class="mb-12 bg-white/5 border border-white/10 rounded-[32px] p-8">
            <h2 class="text-xs font-black uppercase text-gray-500 tracking-widest mb-6 flex items-center gap-3">
                <i class="fas fa-cog text-yellow-400"></i> Configuraciones Globales (Nave Mercante)
            </h2>
            <form id="global-settings-form" class="grid grid-cols-1 md:grid-cols-3 gap-6 items-end">
                <div>
                    <label class="block text-[10px] font-black uppercase text-gray-500 mb-2">Cooldown Estándar (Horas)</label>
                    <input type="number" name="standard_cooldown_hours" value="{{ settings.standard_cooldown_hours }}" class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-sm font-mono focus:border-yellow-400 outline-none">
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase text-gray-500 mb-2">Cooldown Black (Horas)</label>
                    <input type="number" name="black_cooldown_hours" value="{{ settings.black_cooldown_hours }}" class="w-full bg-black/40 border border-white/10 rounded-xl px-4 py-3 text-sm font-mono focus:border-yellow-400 outline-none">
                </div>
                <button type="submit" class="bg-yellow-400 text-black py-3 px-6 rounded-xl text-[10px] font-black uppercase tracking-widest hover:brightness-110 transition-all">
                    Guardar Globales
                </button>
            </form>
        </section>

        <!-- Tabs -->
        <div class="flex gap-4 mb-8">
            <button onclick="switchTab('configs')" id="tab-configs" class="px-6 py-2 rounded-xl bg-yellow-400 text-black font-black uppercase text-xs tracking-widest shadow-lg shadow-yellow-400/20">Configuraciones</button>
            <button onclick="switchTab('exchanges')" id="tab-exchanges" class="px-6 py-2 rounded-xl bg-white/5 text-white/40 font-black uppercase text-xs tracking-widest hover:text-white transition-all">Intercambios Activos</button>
        </div>

        <!-- TAB: CONFIGS -->
        <section id="section-configs">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-bold">Relaciones de Intercambio</h2>
                <button onclick="openCreateModal()" class="bg-yellow-400/10 border border-yellow-400/20 text-yellow-400 px-4 py-2 rounded-xl text-xs font-black uppercase hover:bg-yellow-400/20 transition-all">+ Nueva Config</button>
            </div>

            <div class="bg-white/5 border border-white/10 rounded-3xl overflow-hidden">
                <table class="w-full text-left">
                    <thead class="bg-black/40 text-[10px] uppercase font-black tracking-widest text-gray-500">
                        <tr>
                            <th class="px-6 py-4">Mineral</th>
                            <th class="px-6 py-4">Mercado</th>
                            <th class="px-6 py-4">Multiplicador (GOLD)</th>
                            <th class="px-6 py-4">Estado</th>
                            <th class="px-6 py-4 text-right">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="configs-list">
                        <!-- Loading -->
                    </tbody>
                </table>
            </div>
        </section>

        <!-- TAB: EXCHANGES -->
        <section id="section-exchanges" class="hidden">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-lg font-bold">Historial de Ventas Bulk</h2>
                <button onclick="loadExchanges()" class="text-xs text-gray-500 hover:text-white font-bold uppercase tracking-widest"><i class="fas fa-sync-alt mr-1"></i> Actualizar</button>
            </div>
            <div class="bg-white/5 border border-white/10 rounded-3xl overflow-hidden text-sm">
                <table class="w-full text-left">
                    <thead class="bg-black/40 text-[10px] uppercase font-black tracking-widest text-gray-500">
                        <tr>
                            <th class="px-6 py-4">Usuario</th>
                            <th class="px-6 py-4">Mineral</th>
                            <th class="px-6 py-4">Cantidad</th>
                            <th class="px-6 py-4">Pago (GOLD)</th>
                            <th class="px-6 py-4">Fecha</th>
                            <th class="px-6 py-4">Estado</th>
                        </tr>
                    </thead>
                    <tbody id="exchanges-list">
                        <!-- Loading -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Modal Container -->
    <div id="modal-container" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm px-6">
        <div class="bg-[#101030] border border-white/10 rounded-[32px] p-8 w-full max-w-md">
            <h3 id="modal-title" class="text-xl font-black uppercase italic mb-6">Configurar Mineral</h3>
            <form id="config-form" class="space-y-4">
                <input type="hidden" name="config_id" id="config_id">
                <div>
                    <label class="block text-[10px] font-black uppercase text-gray-500 mb-1">Mineral</label>
                    <select name="mineral_id" id="form-mineral" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:border-yellow-400 outline-none">
                        {% for m in minerals %}
                        <option value="{{ m.id }}">{{ m.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase text-gray-500 mb-1">Mercado Target</label>
                    <select name="is_black" id="form-is-black" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:border-yellow-400 outline-none">
                        <option value="false">Standard (CosmosGOLD)</option>
                        <option value="true">Black (BlackGOLD)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase text-gray-500 mb-1">Multiplicador (1 und = X gold)</label>
                    <input type="number" step="0.01" name="gold_multiplier" id="form-multiplier" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm focus:border-yellow-400 outline-none">
                </div>
                <div class="flex items-center gap-3 py-2">
                    <input type="checkbox" name="is_active" id="form-active" checked class="w-4 h-4 accent-yellow-400 cursor-pointer">
                    <label for="form-active" class="text-xs uppercase font-black text-gray-300 cursor-pointer">Activo en mercado</label>
                </div>
                <div class="flex gap-3 pt-6">
                    <button type="button" onclick="closeModal()" class="flex-1 py-4 text-[10px] font-black uppercase tracking-widest text-gray-500 hover:text-white transition-all">Cancelar</button>
                    <button type="submit" class="flex-1 py-4 bg-yellow-400 text-black rounded-2xl text-[10px] font-black uppercase tracking-widest">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const csrftoken = "{{ csrf_token }}";

        async function switchTab(tab) {
            document.getElementById('section-configs').classList.add('hidden');
            document.getElementById('section-exchanges').classList.add('hidden');
            document.getElementById(`section-${tab}`).classList.remove('hidden');

            document.querySelectorAll('[id^="tab-"]').forEach(el => {
                 el.classList.replace('bg-yellow-400', 'bg-white/5');
                 el.classList.replace('text-black', 'text-white/40');
            });
            const active = document.getElementById(`tab-${tab}`);
            active.classList.replace('bg-white/5', 'bg-yellow-400');
            active.classList.replace('text-white/40', 'text-black');

            if(tab === 'configs') await loadConfigs();
            else await loadExchanges();
        }

        async function loadConfigs() {
            const list = document.getElementById('configs-list');
            list.innerHTML = '<tr><td colspan="5" class="p-10 text-center text-gray-500 animate-pulse text-[10px] font-black">Cargando...</td></tr>';
            try {
                const res = await fetch('/dashboard/market/configs/', { method: 'POST', headers: {'X-CSRFToken': csrftoken} });
                const data = await res.json();
                if(data.success) {
                    list.innerHTML = data.items.map(c => `
                        <tr class="border-t border-white/5 hover:bg-white/5 transition-all text-sm">
                            <td class="px-6 py-4 font-black">${c.mineral_name}</td>
                            <td class="px-6 py-4 text-[10px] font-black uppercase">
                                <span class="${c.is_black ? 'text-pink' : 'text-accent'}">${c.is_black ? 'BLACK' : 'STANDARD'}</span>
                            </td>
                            <td class="px-6 py-4 font-mono text-yellow-400 font-bold">x${c.gold_multiplier.toFixed(2)}</td>
                            <td class="px-6 py-4">
                                <span class="px-2 py-1 rounded-lg text-[9px] font-black uppercase ${c.is_active ? 'bg-green-500/10 text-green-500' : 'bg-red-500/10 text-red-500'}">
                                    ${c.is_active ? 'Activo' : 'Pausado'}
                                </span>
                            </td>
                            <td class="px-6 py-4 text-right">
                                <button onclick='openEditModal(${JSON.stringify(c).replace(/'/g, "&apos;")})' class="text-blue-400 hover:text-white mr-3"><i class="fas fa-edit"></i></button>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch(e) { console.error(e); }
        }

        async function loadExchanges() {
            const list = document.getElementById('exchanges-list');
            list.innerHTML = '<tr><td colspan="6" class="p-10 text-center text-gray-500 animate-pulse text-[10px] font-black">Cargando...</td></tr>';
            try {
                const res = await fetch('/dashboard/market/exchanges/', { method: 'POST', headers: {'X-CSRFToken': csrftoken} });
                const data = await res.json();
                if(data.success) {
                    list.innerHTML = data.items.map(ex => `
                        <tr class="border-t border-white/5 hover:bg-white/5 transition-all">
                            <td class="px-6 py-4 font-bold text-xs">${ex.username}</td>
                            <td class="px-6 py-4 text-xs">${ex.mineral}</td>
                            <td class="px-6 py-4 font-mono">${ex.amount}</td>
                            <td class="px-6 py-4 font-mono text-yellow-400 font-bold">${ex.gold.toFixed(2)}</td>
                            <td class="px-6 py-4 text-[10px] text-gray-500">${new Date(ex.end_time).toLocaleString()}</td>
                            <td class="px-6 py-4">
                                <span class="text-gray-500 uppercase text-[9px] font-black italic">Procesado</span>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch(e) { console.error(e); }
        }

        function openCreateModal() {
            document.getElementById('config-form').reset();
            document.getElementById('config_id').value = '';
            document.getElementById('modal-title').innerText = 'Nueva Configuración';
            document.getElementById('form-mineral').disabled = false;
            document.getElementById('modal-container').classList.remove('hidden');
        }

        function openEditModal(c) {
            document.getElementById('config_id').value = c.id;
            document.getElementById('modal-title').innerText = `Editar ${c.mineral_name}`;
            document.getElementById('form-mineral').value = c.mineral_id;
            document.getElementById('form-mineral').disabled = true;
            document.getElementById('form-is-black').value = c.is_black.toString();
            document.getElementById('form-multiplier').value = c.gold_multiplier;
            document.getElementById('form-active').checked = c.is_active;
            document.getElementById('modal-container').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal-container').classList.add('hidden'); }

        document.getElementById('config-form').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('config_id').value;
            const url = id ? `/dashboard/market/update/${id}/` : '/dashboard/market/create/';
            const formData = new FormData(e.target);
            try {
                const res = await fetch(url, { method: 'POST', headers: {'X-CSRFToken': csrftoken}, body: formData });
                const data = await res.json();
                if(data.success) {
                    Swal.fire({icon: 'success', title: 'Guardado', background: '#05050f', color: '#fff'});
                    closeModal();
                    loadConfigs();
                } else {
                    Swal.fire({icon: 'error', title: 'Error', text: data.error, background: '#05050f', color: '#fff'});
                }
            } catch(e) { console.error(e); }
        };

        document.getElementById('global-settings-form').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            try {
                const res = await fetch('/dashboard/market/settings/update/', { method: 'POST', headers: {'X-CSRFToken': csrftoken}, body: formData });
                const data = await res.json();
                if(data.success) {
                    Swal.fire({icon: 'success', title: 'Globales Guardados', background: '#05050f', color: '#fff'});
                } else {
                    Swal.fire({icon: 'error', title: 'Error', text: data.error, background: '#05050f', color: '#fff'});
                }
            } catch(e) { console.error(e); }
        };

        window.onload = loadConfigs;
    </script>
</body>
</html>
