<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Admin Temporadas · Cosmos Miners</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        space: "#05050f",
                        card: "rgba(20,30,60,0.75)",
                        accent: "#00e0ff",
                        pink: "#ff4d8d",
                    }
                }
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .swal2-popup { background: #0a0a20 !important; color: white !important; border: 1px solid rgba(255,255,255,0.1) !important; border-radius: 24px !important; }
        .swal2-title { color: white !important; }
        .swal2-confirm { background: #00e0ff !important; color: black !important; font-weight: bold; }
        .swal2-cancel { background: rgba(255,255,255,0.1) !important; color: white !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #00e0ff; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen bg-space text-white overflow-x-hidden relative pb-20">
    <div class="absolute inset-0 bg-[radial-gradient(circle,_rgba(255,255,255,0.1)_1px,_transparent_1px)] bg-[size:32px_32px] opacity-20"></div>

    <header class="relative z-10 px-6 py-6 flex items-center justify-between max-w-6xl mx-auto border-b border-white/5">
        <div class="flex items-center gap-3">
            <i class="fas fa-trophy text-accent text-2xl"></i>
            <span class="font-extrabold tracking-widest text-lg bg-gradient-to-r from-accent to-pink bg-clip-text text-transparent uppercase">COSMOS</span>
            <span class="text-xs text-gray-400 ml-2 uppercase font-black italic">Gestión de Temporadas</span>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="openModal()" class="bg-accent text-black px-5 py-2 rounded-xl text-xs font-black uppercase tracking-widest hover:scale-105 transition-transform">
                <i class="fas fa-plus mr-1"></i> Nueva Temporada
            </button>
            <a href="/dashboard/admin/" class="bg-white/5 border border-white/10 px-4 py-2 rounded-xl text-xs font-bold uppercase tracking-widest">Volver</a>
        </div>
    </header>

    <main class="relative z-10 px-6 mt-10 max-w-6xl mx-auto">
        <div class="overflow-hidden rounded-3xl border border-white/5 bg-card backdrop-blur-xl">
            <table class="w-full text-left">
                <thead class="bg-white/5 text-[10px] uppercase font-black tracking-widest text-gray-500">
                    <tr>
                        <th class="px-6 py-4">Temporada</th>
                        <th class="px-6 py-4">Inicio - Fin</th>
                        <th class="px-6 py-4">Reclamo</th>
                        <th class="px-6 py-4">Estado</th>
                        <th class="px-6 py-4 text-right">Acciones</th>
                    </tr>
                </thead>
                <tbody id="seasonsTable" class="divide-y divide-white/5"></tbody>
            </table>
        </div>
    </main>

    <!-- Modal Temporada -->
    <div id="modal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/80 backdrop-blur-sm hidden p-4">
        <div class="bg-[#0a0a20] border border-white/10 w-full max-w-xl rounded-3xl p-8 relative">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-gray-500 hover:text-white transition-colors"><i class="fas fa-times"></i></button>
            <h2 id="modalTitle" class="text-2xl font-black mb-6 uppercase tracking-tight">Temporada</h2>
            <form id="seasonForm" class="space-y-5">
                <input type="hidden" id="editId">
                <div>
                    <label class="block text-[10px] uppercase text-gray-500 font-black mb-1.5">Nombre</label>
                    <input type="text" id="fName" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none text-sm focus:border-accent">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-[10px] uppercase text-gray-500 font-black mb-1.5">Inicio</label>
                        <input type="datetime-local" id="fStartDate" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none text-sm">
                    </div>
                    <div>
                        <label class="block text-[10px] uppercase text-gray-500 font-black mb-1.5">Fin</label>
                        <input type="datetime-local" id="fEndDate" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none text-sm">
                    </div>
                </div>
                <div>
                    <label class="block text-[10px] uppercase text-gray-500 font-black mb-1.5">Reclamo</label>
                    <input type="datetime-local" id="fClaimDate" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none text-sm">
                </div>
                <div class="flex items-center gap-3 px-1">
                    <input type="checkbox" id="fOverride" class="w-4 h-4 rounded border-white/10 bg-white/5 text-accent">
                    <label for="fOverride" class="text-[10px] uppercase font-bold text-gray-400">Forzar Actual</label>
                </div>
                <div class="flex justify-end gap-3 pt-4">
                    <button type="button" onclick="closeModal()" class="px-6 py-3 rounded-xl bg-white/5 text-[10px] font-black uppercase">Cancelar</button>
                    <button type="submit" class="px-8 py-3 rounded-xl bg-accent text-black text-[10px] font-black uppercase">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Modal Niveles -->
    <div id="levelsModal" class="fixed inset-0 z-50 flex items-center justify-center bg-black/90 backdrop-blur-sm hidden p-4">
        <div class="bg-[#0a0a20] border border-white/10 w-full max-w-4xl max-h-[90vh] overflow-y-auto rounded-3xl p-8 relative custom-scrollbar">
            <button onclick="closeLevelsModal()" class="absolute top-6 right-6 text-gray-500 hover:text-white"><i class="fas fa-times"></i></button>
            <h2 id="levelsModalTitle" class="text-2xl font-black mb-6 uppercase tracking-tight italic text-accent">Niveles</h2>
            <button onclick="openLevelForm()" class="mb-6 bg-accent/20 text-accent border border-accent/30 px-4 py-2 rounded-xl text-[10px] font-black uppercase hover:bg-accent hover:text-black transition-all">+ Añadir Nivel</button>
            <div id="levelsList" class="grid gap-4 sm:grid-cols-2"></div>
        </div>
    </div>

    <!-- Modal Form Nivel (DINÁMICO) -->
    <div id="levelFormModal" class="fixed inset-0 z-[60] flex items-center justify-center bg-black/80 backdrop-blur-sm hidden p-4 overflow-y-auto">
        <div class="bg-[#0a0a20] border border-white/10 w-full max-w-xl rounded-3xl p-8 relative">
            <button onclick="closeLevelFormModal()" class="absolute top-6 right-6 text-gray-500 hover:text-white"><i class="fas fa-times"></i></button>
            <h3 id="levelFormTitle" class="text-xl font-black mb-6 uppercase tracking-tight italic">Nivel Estelar</h3>
            <form id="levelForm" class="space-y-6">
                <input type="hidden" id="levelEditId">
                <div>
                    <label class="block text-[10px] uppercase text-gray-500 font-black mb-1.5">Nombre del Nivel</label>
                    <input type="text" id="lnName" required placeholder="Nivel 1" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none text-sm text-white focus:border-accent">
                </div>
                <div>
                    <label class="block text-[10px] uppercase text-gray-500 font-black mb-1.5">Días de Bloqueo de Items</label>
                    <input type="number" id="lnLock" value="7" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none text-sm text-white focus:border-accent">
                </div>

                <!-- Requisitos Dinámicos -->
                <div class="border-t border-white/5 pt-6">
                    <div class="flex items-center justify-between mb-4">
                        <label class="block text-[10px] uppercase text-accent font-black tracking-widest">Requisitos de Entrada</label>
                        <button type="button" onclick="addRequirementRow()" class="text-[9px] font-black uppercase bg-white/5 px-3 py-1.5 rounded-lg border border-white/10 hover:border-accent transition-all">+ Añadir Requisito</button>
                    </div>
                    <div id="requirementsContainer" class="space-y-3">
                        <!-- Rows added here -->
                    </div>
                </div>

                <button type="submit" class="w-full py-5 rounded-2xl bg-accent text-black text-[12px] font-black uppercase tracking-[0.2em] shadow-[0_0_20px_rgba(0,224,255,0.2)] hover:brightness-110">Guardar Configuración de Nivel</button>
            </form>
        </div>
    </div>

    <script>
        let selectedSeasonId = null;
        const reqTypes = {
            'miner_attempts': 'Mín. Intentos Minero',
            'transport_speed': 'Mín. Velocidad (Transporte %)',
            'tool_multiplier': 'Mín. Multiplicador (Herramienta)'
        };

        function renderStatusBadge(status) {
            const css = { 
                active: 'bg-green-500/10 text-green-500 border-green-500/20', 
                upcoming: 'bg-accent/10 text-accent border-accent/20', 
                finished: 'bg-gray-500/10 text-gray-500 border-gray-500/20' 
            };
            const labels = { active: 'En Competición', upcoming: 'Programada', finished: 'Finalizada' };
            const icons = { active: 'fa-rocket animate-pulse', upcoming: 'fa-calendar-alt', finished: 'fa-flag-checkered' };
            return `<span class="px-3 py-1.5 rounded-xl border ${css[status]} text-[9px] font-black uppercase tracking-widest flex items-center gap-2 w-fit">
                        <i class="fas ${icons[status]}"></i>
                        ${labels[status]}
                    </span>`;
        }

        async function loadSeasons() {
            const res = await fetch('/dashboard/seasons/list/', { method: 'POST', headers: { 'X-CSRFToken': '{{ csrf_token }}' } });
            const data = await res.json();
            const table = document.getElementById('seasonsTable');
            table.innerHTML = data.items.map(s => `
                <tr class="hover:bg-white/5 transition-colors group border-b border-white/5">
                    <td class="px-6 py-5">
                        <span class="font-black uppercase tracking-tight text-white">${s.name}</span>
                        ${s.is_active_override ? '<span class="ml-2 bg-pink text-[8px] text-black font-black px-1.5 py-0.5 rounded uppercase">FORZADA</span>' : ''}
                    </td>
                    <td class="px-6 py-5 text-[10px] font-bold text-gray-400">
                        ${new Date(s.start_date).toLocaleString()} <BR/> al ${new Date(s.end_date).toLocaleString()}
                    </td>
                    <td class="px-6 py-5 text-[10px] font-bold text-gray-400">${new Date(s.claim_rewards_at).toLocaleString()}</td>
                    <td class="px-6 py-5">${renderStatusBadge(s.status)}</td>
                    <td class="px-6 py-5 text-right">
                        <div class="flex justify-end gap-2">
                            <button onclick='openLevelsModal(${s.id}, "${s.name}")' title="Gestionar Niveles" class="w-9 h-9 rounded-xl bg-accent/10 text-accent hover:bg-accent flex items-center justify-center transition-all hover:text-black"><i class="fas fa-layer-group"></i></button>
                            <button onclick='editSeason(${JSON.stringify(s).replace(/'/g, "&apos;")})' class="w-9 h-9 rounded-xl bg-white/5 text-gray-400 hover:text-white flex items-center justify-center transition-all"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteSeason(${s.id})" class="w-9 h-9 rounded-xl bg-red-500/10 text-red-500 hover:bg-red-500 flex items-center justify-center transition-all hover:text-white"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        // Season Logic...
        function openModal() { document.getElementById('editId').value = ''; document.getElementById('seasonForm').reset(); document.getElementById('modalTitle').innerText = 'Nueva Temporada'; document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        async function toggleOverride(id) { await fetch(`/dashboard/seasons/toggle/${id}/`, { method: 'POST', headers: { 'X-CSRFToken': '{{ csrf_token }}' } }); loadSeasons(); }
        async function deleteSeason(id) { if (await Swal.fire({ title: '¿Borrar?', showCancelButton: true }).then(r => r.isConfirmed)) { await fetch(`/dashboard/seasons/delete/${id}/`, { method: 'POST', headers: { 'X-CSRFToken': '{{ csrf_token }}' } }); loadSeasons(); } }
        function editSeason(s) {
            document.getElementById('editId').value = s.id;
            document.getElementById('fName').value = s.name;
            document.getElementById('fStartDate').value = s.start_date.substring(0, 16);
            document.getElementById('fEndDate').value = s.end_date.substring(0, 16);
            document.getElementById('fClaimDate').value = s.claim_rewards_at.substring(0, 16);
            document.getElementById('fOverride').checked = s.is_active_override;
            document.getElementById('modalTitle').innerText = 'Editar Temporada';
            document.getElementById('modal').classList.remove('hidden');
        }
        document.getElementById('seasonForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('editId').value;
            const url = id ? `/dashboard/seasons/update/${id}/` : '/dashboard/seasons/create/';
            await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' }, body: JSON.stringify({
                name: document.getElementById('fName').value, start_date: document.getElementById('fStartDate').value, end_date: document.getElementById('fEndDate').value, claim_rewards_at: document.getElementById('fClaimDate').value, is_active_override: document.getElementById('fOverride').checked
            })});
            closeModal(); loadSeasons();
        }

        // LEVELS DYNAMIC LOGIC
        async function openLevelsModal(seasonId, seasonName) {
            selectedSeasonId = seasonId;
            document.getElementById('levelsModalTitle').innerText = `Niveles: ${seasonName}`;
            document.getElementById('levelsModal').classList.remove('hidden');
            loadLevels();
        }
        function closeLevelsModal() { document.getElementById('levelsModal').classList.add('hidden'); }

        async function loadLevels() {
            const grid = document.getElementById('levelsList');
            const res = await fetch(`/dashboard/seasons/levels/list/${selectedSeasonId}/`, { method: 'POST', headers: { 'X-CSRFToken': '{{ csrf_token }}' } });
            const data = await res.json();
            grid.innerHTML = data.items.map(l => `
                <div class="bg-white/5 border border-white/5 p-6 rounded-3xl flex justify-between items-start group hover:border-accent/40 transition-all">
                    <div>
                        <h4 class="font-black uppercase tracking-tight text-white mb-3 text-lg italic">${l.name}</h4>
                        <div class="space-y-1">
                            ${l.requirements.map(r => `<p class="text-[10px] text-gray-500 font-black uppercase tracking-widest"><span class="text-accent">•</span> ${reqTypes[r.type]}: <span class="text-white">${r.value}</span></p>`).join('')}
                            <p class="text-[9px] text-pink font-black uppercase mt-3">BLOQUEO: ${l.lock_duration_days} DÍAS</p>
                        </div>
                    </div>
                    <div class="flex flex-col gap-2">
                        <button onclick='editLevel(${JSON.stringify(l).replace(/'/g, "&apos;")})' class="w-8 h-8 rounded-xl bg-white/5 text-accent hover:bg-accent hover:text-black flex items-center justify-center transition-all"><i class="fas fa-edit text-xs"></i></button>
                        <button onclick="deleteLevel(${l.id})" class="w-8 h-8 rounded-xl bg-red-500/10 text-red-500 hover:bg-red-500 flex items-center justify-center transition-all hover:text-white"><i class="fas fa-trash text-xs"></i></button>
                    </div>
                </div>
            `).join(data.items.length ? '' : '<div class="col-span-full py-10 text-center text-gray-600 italic uppercase font-black tracking-widest">No hay niveles definidos</div>');
        }

        function addRequirementRow(type = '', value = '') {
            const container = document.getElementById('requirementsContainer');
            const row = document.createElement('div');
            row.className = 'flex items-center gap-2 requirement-row animate-in fade-in slide-in-from-top-2 duration-300';
            row.innerHTML = `
                <select class="req-type flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none text-xs text-white focus:border-accent">
                    <option value="miner_attempts" ${type === 'miner_attempts' ? 'selected' : ''}>Mín. Intentos (Minero)</option>
                    <option value="transport_speed" ${type === 'transport_speed' ? 'selected' : ''}>Mín. Velocidad % (Transp)</option>
                    <option value="tool_multiplier" ${type === 'tool_multiplier' ? 'selected' : ''}>Mín. Multiplicador (Herr)</option>
                </select>
                <input type="number" step="0.01" value="${value}" placeholder="Valor" class="req-value w-24 bg-white/5 border border-white/10 rounded-xl px-4 py-3 outline-none text-xs text-white focus:border-accent">
                <button type="button" onclick="this.parentElement.remove()" class="w-10 h-10 rounded-xl bg-red-500/10 text-red-500 flex items-center justify-center hover:bg-red-500 hover:text-white transition-all"><i class="fas fa-minus"></i></button>
            `;
            container.appendChild(row);
        }

        function openLevelForm() {
            document.getElementById('levelEditId').value = '';
            document.getElementById('levelForm').reset();
            document.getElementById('requirementsContainer').innerHTML = '';
            document.getElementById('levelFormTitle').innerText = 'Nuevo Nivel Estelar';
            document.getElementById('levelFormModal').classList.remove('hidden');
        }
        function closeLevelFormModal() { document.getElementById('levelFormModal').classList.add('hidden'); }

        function editLevel(l) {
            document.getElementById('levelEditId').value = l.id;
            document.getElementById('lnName').value = l.name;
            document.getElementById('lnLock').value = l.lock_duration_days;
            document.getElementById('requirementsContainer').innerHTML = '';
            l.requirements.forEach(r => addRequirementRow(r.type, r.value));
            document.getElementById('levelFormTitle').innerText = 'Personalizar Nivel';
            document.getElementById('levelFormModal').classList.remove('hidden');
        }

        document.getElementById('levelForm').onsubmit = async (e) => {
            e.preventDefault();
            const id = document.getElementById('levelEditId').value;
            const url = id ? `/dashboard/seasons/levels/update/${id}/` : '/dashboard/seasons/levels/create/';
            
            const requirements = [];
            document.querySelectorAll('.requirement-row').forEach(row => {
                requirements.push({
                    type: row.querySelector('.req-type').value,
                    value: row.querySelector('.req-value').value
                });
            });

            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'X-CSRFToken': '{{ csrf_token }}' },
                body: JSON.stringify({
                    season_id: selectedSeasonId,
                    name: document.getElementById('lnName').value,
                    lock_duration_days: document.getElementById('lnLock').value,
                    requirements: requirements
                })
            });
            if (res.ok) { closeLevelFormModal(); loadLevels(); }
        }

        async function deleteLevel(id) {
            if (await Swal.fire({ title: '¿Eliminar este nivel?', text: 'Esto borrará también sus requisitos.', showCancelButton: true, confirmButtonText: 'Sí, borrar' }).then(r => r.isConfirmed)) {
                await fetch(`/dashboard/seasons/levels/delete/${id}/`, { method: 'POST', headers: { 'X-CSRFToken': '{{ csrf_token }}' } });
                loadLevels();
            }
        }

        window.onload = loadSeasons;
    </script>
</body>
</html>
